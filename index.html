<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantra AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>⚽ Mantra AI</h1>

    <div class="dashboard">

      <div class="card">
        <h3>Crediti</h3>
        <span id="credits">300</span>
      </div>

      <div class="card">
        <h3>Giocatori</h3>
        <span id="players">0</span>
      </div>

      <div class="card">
        <h3>Modulo</h3>
        <span id="module">--</span>
      </div>

    </div>

    <div class="search-box">

      <input
        id="search"
        type="text"
        placeholder="Cerca giocatore..."
      >

      <button onclick="searchPlayer()">
        Cerca
      </button>

    </div>

    <div id="result"></div>

    <div class="card">

      <h2>Priorità attuale</h2>

      <ul>
        <li>Nico Paz</li>
        <li>McTominay</li>
        <li>Da Cunha</li>
      </ul>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
